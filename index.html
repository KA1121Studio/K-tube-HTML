<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム</title>

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/1/19/Google_Classroom_Logo.svg">

  <style>
    html, body, iframe {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      border: none;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <iframe
    id="frame"
    allowfullscreen
    allow="fullscreen"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals">
  </iframe>

  <script>
    const targetURL = "https://k-tube-for-public-release.vercel.app";
    document.getElementById("frame").src = targetURL;
  </script>

</body>
</html>
